<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sapphire CI/CD Pipeline</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      padding: 40px;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 40px;
      color: #38bdf8;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 22px;
      color: #e2e8f0;
      margin-bottom: 20px;
    }

    .status {
      display: inline-block;
      padding: 10px 20px;
      background: #22c55e;
      color: #000;
      font-weight: bold;
      border-radius: 25px;
      margin-top: 15px;
    }

    .footer {
      margin-top: 30px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🚀 Sapphire CI/CD Pipeline</h1>
    <h2>Harbor + GitHub Actions + ArgoCD</h2>

    <p>Private Registry successfully integrated</p>
    <p>GitOps Deployment is working perfectly</p>

    <div class="status">✅ SYSTEM RUNNING</div>

    <div class="footer">
      <p>Powered by DevOps Automation</p>
      <p>Sapphire Consulting Services</p>
    </div>
  </div>

</body>
</html>
