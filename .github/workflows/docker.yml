name: Build and Push to Harbor

on:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: checkout
      uses: actions/checkout@v3

    - name: docker login harbor
      run: |
        echo "${{ secrets.HARBOR_PASS }}" | docker login http://192.168.1.133 \
        -u "${{ secrets.HARBOR_USER }}" \
        --password-stdin

    - name: build image
      run: |
        docker build -t 192.168.1.133/tmtd/nginx:v1 .

    - name: push image
      run: |
        docker push 192.168.1.133/tmtd/nginx:v1
